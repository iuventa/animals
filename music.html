<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="icon" href="assets/img/sound.png">
    <title>სამყაროს ხმები</title>
</head>
<body>
    <header>
        <h1>
            <a href="index.html">
                მუსიკალური ინსტრუმენტების ხმები
            </a>
        </h1>


        <h2>[დააჭირე ინსტრუმენტს რომ გაიგო ხმა]</h2>

        <h3 class="goback">
          <a href="index.html" class="flex"><img src="assets/img/arrow.png" alt="goback arrow"> უკან დაბრუნება</a>  
        </h3>
        
    </header>
    <main>
        <div class="container flex">
            <p class="item music flex accordeon" musicname="accordeon">
                <span>აკორდეონი</span>
            </p>
            <p class="item music flex arfa" musicname="arfa">
                <span>არფა</span>
            </p>
            <p class="item music flex drum" musicname="drum">
                <span>დოლი/დრამი</span>
            </p>
            <p class="item music flex guitar" musicname="guitar">
                <span>გიტარა</span>
            </p>
            <p class="item music flex panduri" musicname="panduri">
                <span>ფანდური</span>
            </p>
            <p class="item music flex piano" musicname="piano">
                <span>ფორტეპიანო</span>
            </p>
            <p class="item music flex qsiloponi" musicname="qsiloponi">
                <span>ქსილოფონი</span>
            </p>
            <p class="item music flex violin" musicname="violin">
                <span>ვიოლინო</span>
            </p>
            <p class="item music flex maracas" musicname="maracas">
                <span>მარაკასი</span>
            </p>
            <p class="item music flex tamburine" musicname="tamburine">
                <span>ტამბურინი</span>
            </p>
            <p class="item music flex trumpet" musicname="trumpet">
                <span>ტრუბა</span>
            </p>
            <p class="item music flex flute" musicname="flute">
                <span>ფლეიტა</span>
            </p>
        </div>
    </main>
    <footer>
        <p>დამზადებულია 
            <a href="https://webcode.ge/" target="_blank">webcode.ge</a>-ის მიერ
        </p>
        <p>&copy; ყველა უფლება დაცულია</p>
    </footer>
    <script src="js/music.js"></script>
    <script src="js/test.js"></script>
</body>
</html>
